name: CI

on:
  push:
    branches: [develop]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - "LICENSE*"
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - "LICENSE*"

permissions:
  contents: read
  checks: write

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUST_BACKTRACE: short
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: clippy-${{ matrix.os }}
          save-if: ${{ github.ref == 'refs/heads/develop' }}
      - run: cargo clippy --all-targets -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: test-${{ matrix.os }}
          save-if: ${{ github.ref == 'refs/heads/develop' }}
      - uses: taiki-e/install-action@nextest
      - run: cargo nextest run --profile ci
      - run: cargo test --doc

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: coverage
          save-if: ${{ github.ref == 'refs/heads/develop' }}
      - uses: taiki-e/install-action@cargo-llvm-cov
      - run: cargo llvm-cov --lcov --output-path lcov.info
      - uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          VERSION=$(curl -sSf https://api.github.com/repos/gitleaks/gitleaks/releases/latest | jq -r .tag_name | sed 's/^v//')
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | sudo tar xz -C /usr/local/bin gitleaks
      - name: Run gitleaks
        run: gitleaks detect --source . --log-opts "${{ github.event.before }}..${{ github.sha }}" --verbose

  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  feature-check:
    name: Feature Powerset
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: hack
          save-if: ${{ github.ref == 'refs/heads/develop' }}
      - uses: taiki-e/install-action@cargo-hack
      - run: cargo hack check --feature-powerset --depth 2 --no-dev-deps

  e2e:
    name: E2E (mock mode)
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: e2e
          save-if: ${{ github.ref == 'refs/heads/develop' }}
      - name: Build grob binary
        run: cargo build --release
      - name: Install hurl
        run: |
          VERSION=6.1.0
          curl -sSfL "https://github.com/Orange-OpenSource/hurl/releases/download/${VERSION}/hurl-${VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar xz -C /usr/local/bin --strip-components=1 "hurl-${VERSION}-x86_64-unknown-linux-gnu/hurl"
      - name: Install age + python deps
        run: sudo apt-get install -y age python3-jwt python3-cryptography
      - name: Install just
        uses: taiki-e/install-action@just
      - name: Generate test materials
        run: just -f tests/e2e/justfile generate-all
      # TODO: add Podman pod when available on ubuntu-latest
      - name: Start grob (mock mode)
        run: |
          GROB_CONFIG=tests/e2e/config/mock/grob-test.toml ./target/release/grob start &
          sleep 3
          curl -sf http://127.0.0.1:13456/health || { echo "Grob failed to start"; exit 1; }
        env:
          RUST_LOG: info
      - name: Run all mock tests
        run: just -f tests/e2e/justfile test-mock-all
      - name: Stop grob
        if: always()
        run: just -f tests/e2e/justfile down

  docs:
    name: Doc Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: docs
          save-if: ${{ github.ref == 'refs/heads/develop' }}
      - name: Check missing doc comments
        env:
          RUSTDOCFLAGS: "-W missing-docs"
        run: |
          WARNINGS=$(cargo doc --no-deps 2>&1 | grep "^warning: missing documentation" | wc -l)
          if [ "$WARNINGS" -gt 0 ]; then
            echo "::error::Found $WARNINGS undocumented public items"
            cargo doc --no-deps 2>&1 | grep "^warning: missing documentation" -A2
            exit 1
          fi
          echo "All public items are documented"

  machete:
    name: Unused Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: machete
          save-if: ${{ github.ref == 'refs/heads/develop' }}
      - uses: bnjbvr/cargo-machete@main

  semver:
    name: API Compatibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: semver
          save-if: ${{ github.ref == 'refs/heads/develop' }}
      - name: Install cargo-semver-checks
        run: cargo install cargo-semver-checks --locked
      - name: Find latest tag for baseline
        id: baseline
        run: |
          TAG=$(git tag --sort=-v:refname | head -1)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
      - name: Check semver compatibility
        if: steps.baseline.outputs.tag != ''
        run: cargo semver-checks --baseline-rev ${{ steps.baseline.outputs.tag }}
