# ── Cache ────────────────────────────────────────────────────────

[cache]
enabled = true
max_capacity = 2000
ttl_secs = 3600
max_entry_bytes = 4194304
simhash_threshold = 3

# ── Budget ───────────────────────────────────────────────────────

[budget]
monthly_limit_usd = 120.0
warn_at_percent = 80

# ── DLP ──────────────────────────────────────────────────────────

[dlp]
enabled = true
scan_input = true
scan_output = true

# ── Security ─────────────────────────────────────────────────────

[security]
rate_limit_rps = 1000
rate_limit_burst = 2000
