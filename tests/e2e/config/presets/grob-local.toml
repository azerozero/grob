# Preset: local — Air-gapped local inference via Ollama
# No external API keys required. All requests routed to local Ollama instance.
# Suitable for offline development, CI without network access, and
# privacy-sensitive workloads where no data must leave the machine.
#
# Required environment variables:
#   (none — Ollama does not require an API key)
#
# Prerequisites:
#   Ollama must be running: `ollama serve`
#   At least one model must be pulled: `ollama pull llama3`

[server]
host = "127.0.0.1"
port = 13456

[router]
default_provider = "ollama"
fallback_providers = []

[[providers]]
name = "ollama"
kind = "ollama"
base_url = "http://127.0.0.1:11434"
