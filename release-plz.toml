[workspace]
# Don't publish to crates.io — release via git tags only
publish = false
# Determine versions from git tags, not the cargo registry
git_only = true
# GitHub Release is created by the Release workflow (not release-plz)
# to avoid immutable release conflicts when uploading binaries.
git_release_enable = false
git_tag_name = "v{{ version }}"
git_tag_enable = true
changelog_update = true
# Binary-only project — no public library API to check
semver_check = false
pr_labels = ["release"]
# Only bump on feat/fix/refactor/perf commits, any scope.
# Infra changes use chore/docs/test/style/ci prefixes → automatically excluded.
# No scope allowlist needed: the prefix (feat vs chore) is the gate.
release_commits = "^(feat|fix|refactor|perf)(\\([^)]+\\))?:"

[[package]]
name = "grob"
changelog_path = "CHANGELOG.md"
git_release_name = "v{{ version }}"
