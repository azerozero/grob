{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "grob.fullname" . }}
  labels:
    {{- include "grob.labels" . | nindent 4 }}
    {{- with .Values.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "grob.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: http
      path: {{ .Values.serviceMonitor.path }}
      interval: {{ .Values.serviceMonitor.interval }}
      scrapeTimeout: {{ .Values.serviceMonitor.scrapeTimeout }}
      {{- with .Values.serviceMonitor.bearerTokenSecret }}
      {{- if .name }}
      # Present a bearer token when scraping a gated /metrics. The SAME token
      # must be configured in grob via [metrics] bearer_token(_file).
      bearerTokenSecret:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
{{- end }}
