{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "grob.serviceAccountName" . }}
  labels:
    {{- include "grob.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
# grob never calls the Kubernetes API, so no token is mounted into the pod.
automountServiceAccountToken: false
{{- end }}
