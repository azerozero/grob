# cargo-deny configuration for Grob (AGPL-3.0-only)
# https://embarkstudios.github.io/cargo-deny/

# ── Advisories ───────────────────────────────────────────────────────────────
# Checks crates against the RustSec advisory database for known vulnerabilities.
[advisories]
version = 2
# Fail CI on any known vulnerability.
# Review date: 2026-06-08 — re-check if upstream fixed these.
#
# rsa: Marvin Attack (timing sidechannel on PKCS#1 v1.5 decryption). No impact:
# grob only uses RSA for JWT signature verification, not decryption.
ignore = [
    "RUSTSEC-2023-0071",
    # rand: Unsound with custom logger calling rand::rng() (RUSTSEC-2026-0097).
    # No impact: grob does not define a custom logger accessing ThreadRng.
    "RUSTSEC-2026-0097",
    # proc-macro-error2: unmaintained build-time proc-macro, pulled transitively
    # via age → i18n-embed-fl. Compile-time only (not in the runtime binary), no
    # safe upgrade available. Drop when age/i18n-embed-fl migrate off it.
    "RUSTSEC-2026-0173",
    # rustls-pemfile: unmaintained (PEM parsing folded into rustls-pki-types).
    # Pulled transitively via axum-server and rustls-acme; certificate/key PEM
    # parsing only, no security vulnerability. Surfaces under `--all-features`
    # (the CI cargo-deny invocation). Drop when those migrate off it.
    "RUSTSEC-2025-0134",
]

# ── Licenses ─────────────────────────────────────────────────────────────────
# Grob is AGPL-3.0-only. We allow permissive licenses (always compatible),
# copyleft licenses compatible with AGPL-3.0, and a handful of special-purpose
# licenses commonly found in the Rust ecosystem.
[licenses]
version = 2
# Deny everything not explicitly listed.
allow = [
    # ── Permissive ──
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "BSL-1.0",
    "OpenSSL",
    "Unicode-3.0",
    "Unicode-DFS-2016",

    # ── Public-domain-equivalent ──
    "Unlicense",
    "CC0-1.0",

    # ── Copyleft (compatible with AGPL-3.0) ──
    "AGPL-3.0-only",
    "AGPL-3.0-or-later",
    "GPL-3.0-only",
    "GPL-3.0-or-later",
    "LGPL-3.0-only",
    "LGPL-3.0-or-later",
    "MPL-2.0",

    # ── Ecosystem one-offs ──
    "CDLA-Permissive-2.0",
]
# Minimum confidence for SPDX license detection.
confidence-threshold = 0.8

# The grob crate itself is AGPL-3.0-only; list it as an explicit exception
# so cargo-deny never flags the workspace root.
[[licenses.exceptions]]
allow = ["AGPL-3.0-only"]
name = "grob"

# ── Bans ─────────────────────────────────────────────────────────────────────
[bans]
# Warn (don't fail) when multiple versions of the same crate are pulled in.
multiple-versions = "warn"
# Allow wildcard dependencies — common during rapid development.
wildcards = "allow"
highlight = "all"

# ── Sources ──────────────────────────────────────────────────────────────────
# Only allow crates published to crates.io. Warn on anything else.
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
