# VISION : Qwen2.5-VL-72B (largest VL in EU) → Mistral-small → Pixtral
[[models]]
name = "vision-model"
[[models.mappings]]
priority = 1
provider = "nebius"
actual_model = "Qwen/Qwen2.5-VL-72B-Instruct"
[[models.mappings]]
priority = 2
provider = "scaleway"
