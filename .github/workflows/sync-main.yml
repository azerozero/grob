name: Sync develop to main

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Merge develop into main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.RELEASE_PLZ_TOKEN }}

      - name: Merge develop into main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git merge origin/develop --no-edit -X theirs || true
          # If merge still fails (e.g. deleted vs modified), accept develop's version
          if ! git diff --quiet --diff-filter=U; then
            git checkout --theirs .
            git add -A
            git commit --no-edit
          fi
          git push origin main
