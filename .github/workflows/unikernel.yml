# Unikernel build validation.
#
# Ensures the unikernel feature flag compiles correctly and the resulting
# binary stays within the 20 MB size budget.

name: Unikernel

on:
  push:
    branches: [develop]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - "LICENSE*"
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - "LICENSE*"
  workflow_dispatch:

concurrency:
  group: unikernel-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUST_BACKTRACE: short
  RUSTFLAGS: "-D warnings"

jobs:
  build:
    name: Unikernel build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: unikernel
          save-if: ${{ github.ref == 'refs/heads/develop' }}

      # Full feature build (unikernel replaces jemalloc/unix-signals/socket-opts/dirs)
      - name: Build unikernel binary
        run: |
          cargo build --release \
            --no-default-features \
            --features "dlp,oauth,tap,compliance,mcp,policies,unikernel" \
            --target x86_64-unknown-linux-musl

      - name: Check binary size (< 20 MB)
        run: |
          BINARY="target/x86_64-unknown-linux-musl/release/grob"
          SIZE=$(stat --format='%s' "$BINARY")
          SIZE_MB=$((SIZE / 1024 / 1024))
          echo "Binary size: ${SIZE} bytes (${SIZE_MB} MB)"
          if [ "$SIZE" -gt 20971520 ]; then
            echo "::error::Binary exceeds 20 MB budget (${SIZE_MB} MB)"
            exit 1
          fi

      - name: Upload unikernel binary
        uses: actions/upload-artifact@v7
        with:
          name: grob-unikernel-${{ github.sha }}
          path: target/x86_64-unknown-linux-musl/release/grob
          if-no-files-found: error

  test:
    name: Unikernel tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: unikernel-test
          save-if: ${{ github.ref == 'refs/heads/develop' }}

      # Verify compilation with unikernel feature on native target
      - name: Check unikernel compilation
        run: cargo check --features unikernel

      # Verify minimal feature set compiles
      - name: Check minimal unikernel features
        run: |
          cargo check --no-default-features \
            --features "dlp,policies,unikernel"

      # Run test suite with unikernel feature enabled
      - name: Run tests with unikernel feature
        run: cargo test --features unikernel --lib
