apiVersion: v1
kind: Pod
metadata:
  name: grob-demo
  labels:
    app: grob-demo
spec:
  restartPolicy: Always
  initContainers:
  - name: init-keys
    image: localhost/grob-demo-tools:latest
    command:
    - sh
    - /init-keys.sh
    env:
    - name: GROB_HOME
      value: /var/lib/grob
    - name: GROB_CONFIG
      value: /etc/grob/tools.config.toml
    volumeMounts:
    - name: grob-data
      mountPath: /var/lib/grob
    - name: vol-init
      mountPath: /init-keys.sh
      subPath: init-keys.sh
      readOnly: true
    - name: vol-tools-config
      mountPath: /etc/grob/tools.config.toml
      subPath: tools.config.toml
      readOnly: true
  containers:
  - name: grob
    image: localhost/grob-demo:local
    args:
    - run
    - --json-logs
    - --host
    - 0.0.0.0
    - --port
    - '8080'
    env:
    - name: GROB_CONFIG
      value: /etc/grob/config.toml
    - name: GROB_HOME
      value: /var/lib/grob
    - name: GROB_MOCK_BACKEND
      value: http://localhost:8889
    - name: RUST_LOG
      value: info
    ports:
    - containerPort: 8080
      hostPort: 8080
    volumeMounts:
    - name: vol-grob-config
      mountPath: /etc/grob/config.toml
      subPath: config.toml
      readOnly: true
    - name: grob-data
      mountPath: /var/lib/grob
    - name: audit-data
      mountPath: /audit
  - name: mock
    image: docker.io/library/nginx:1.27-alpine
    volumeMounts:
    - name: vol-mock
      mountPath: /etc/nginx/conf.d/default.conf
      subPath: default.conf
      readOnly: true
  - name: lgtm
    image: docker.io/grafana/otel-lgtm:0.11.10
    env:
    - name: GF_AUTH_ANONYMOUS_ENABLED
      value: 'true'
    - name: GF_AUTH_ANONYMOUS_ORG_ROLE
      value: Viewer
    - name: GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH
      value: /otel-lgtm/grafana/conf/provisioning/dashboards/custom/grob-rssi-business.json
    ports:
    - containerPort: 3000
      hostPort: 3000
    volumeMounts:
    - name: vol-prom
      mountPath: /otel-lgtm/prometheus.yaml
      subPath: prometheus.yaml
      readOnly: true
    - name: vol-dash-prov
      mountPath: /otel-lgtm/grafana/conf/provisioning/dashboards/custom.yaml
      subPath: custom.yaml
      readOnly: true
    - name: vol-dash-json
      mountPath: /otel-lgtm/grafana/conf/provisioning/dashboards/custom/grob-rssi-business.json
      subPath: grob-rssi-business.json
      readOnly: true
    - name: vol-dash-overview
      mountPath: /otel-lgtm/grafana/conf/provisioning/dashboards/custom/grob-overview.json
      subPath: grob-overview.json
      readOnly: true
    - name: vol-dash-audit-agent
      mountPath: /otel-lgtm/grafana/conf/provisioning/dashboards/custom/audit-agent.json
      subPath: audit-agent.json
      readOnly: true
    - name: vol-dash-empty
      mountPath: /otel-lgtm/grafana/conf/provisioning/dashboards/grafana-dashboards.yaml
      subPath: empty.yaml
      readOnly: true
    - name: vol-dash-empty
      mountPath: /otel-lgtm/grafana/conf/provisioning/dashboards/sample.yaml
      subPath: empty.yaml
      readOnly: true
  - name: web
    image: docker.io/library/nginx:1.27-alpine
    ports:
    - containerPort: 80
      hostPort: 8088
    volumeMounts:
    - name: vol-web-html
      mountPath: /usr/share/nginx/html/index.html
      subPath: index.html
      readOnly: true
    - name: vol-web-gov
      mountPath: /usr/share/nginx/html/governance.html
      subPath: governance.html
      readOnly: true
    - name: vol-web-nginx
      mountPath: /etc/nginx/conf.d/default.conf
      subPath: default.conf
      readOnly: true
    - name: audit-data
      mountPath: /srv/governance
      readOnly: true
  - name: seed
    image: localhost/grob-demo-tools:latest
    command:
    - sh
    - /seed.sh
    env:
    - name: GROB_URL
      value: http://localhost:8080
    - name: INTERVAL
      value: '1'
    - name: BURN_AFTER
      value: '3'
    - name: AGENTS_FILE
      value: /var/lib/grob/demo-agents.txt
    volumeMounts:
    - name: vol-seed
      mountPath: /seed.sh
      subPath: seed.sh
      readOnly: true
    - name: grob-data
      mountPath: /var/lib/grob
      readOnly: true
  - name: watcher
    image: localhost/grob-demo-tools:latest
    command:
    - sh
    - /watcher.sh
    env:
    - name: GROB_HOME
      value: /var/lib/grob
    - name: GROB_CONFIG
      value: /etc/grob/tools.config.toml
    - name: AUDIT_FILE
      value: /audit/current.jsonl
    - name: STATUS_FILE
      value: /audit/governance.json
    - name: AGENTS_FILE
      value: /var/lib/grob/demo-agents.txt
    - name: THRESHOLD
      value: '8'
    - name: ROGUE_TENANT
      value: compta-bot
    - name: POLL
      value: '3'
    volumeMounts:
    - name: vol-watcher
      mountPath: /watcher.sh
      subPath: watcher.sh
      readOnly: true
    - name: vol-tools-config
      mountPath: /etc/grob/tools.config.toml
      subPath: tools.config.toml
      readOnly: true
    - name: grob-data
      mountPath: /var/lib/grob
    - name: audit-data
      mountPath: /audit
  - name: audit-loki
    image: localhost/grob-demo-tools:latest
    command:
    - sh
    - /audit-loki.sh
    env:
    - name: AUDIT_FILE
      value: /audit/current.jsonl
    - name: LOKI_URL
      value: http://localhost:3100/loki/api/v1/push
    - name: SERVICE
      value: grob-audit
    volumeMounts:
    - name: vol-audit-loki
      mountPath: /audit-loki.sh
      subPath: audit-loki.sh
      readOnly: true
    - name: audit-data
      mountPath: /audit
      readOnly: true
  volumes:
  - name: vol-grob-config
    configMap:
      name: cm-grob-config
  - name: vol-tools-config
    configMap:
      name: cm-tools-config
  - name: vol-mock
    configMap:
      name: cm-mock
  - name: vol-prom
    configMap:
      name: cm-prom
  - name: vol-dash-prov
    configMap:
      name: cm-dash-prov
  - name: vol-dash-json
    configMap:
      name: cm-dash-json
  - name: vol-dash-overview
    configMap:
      name: cm-dash-overview
  - name: vol-dash-audit-agent
    configMap:
      name: cm-dash-audit-agent
  - name: vol-dash-empty
    configMap:
      name: cm-dash-empty
  - name: vol-web-html
    configMap:
      name: cm-web-html
  - name: vol-web-gov
    configMap:
      name: cm-web-gov
  - name: vol-web-nginx
    configMap:
      name: cm-web-nginx
  - name: vol-init
    configMap:
      name: cm-init
  - name: vol-seed
    configMap:
      name: cm-seed
  - name: vol-watcher
    configMap:
      name: cm-watcher
  - name: vol-audit-loki
    configMap:
      name: cm-audit-loki
  - name: grob-data
    emptyDir: {}
  - name: audit-data
    emptyDir: {}
