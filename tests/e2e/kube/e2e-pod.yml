apiVersion: v1
kind: Pod
metadata:
  name: e2e-pod
  labels:
    app: grob-e2e
spec:
  # All containers share a single network namespace — they reach each other
  # via 127.0.0.1 on their respective ports.

  # -------------------------------------------------------------------------
  # Init: generate auth fixtures (EC keypair, JWKS, JWTs, nginx.conf)
  # Writes into the e2e-tree hostPath so the runner and nginx share the
  # same keys/tokens.
  # -------------------------------------------------------------------------
  initContainers:
    - name: auth-init
      image: localhost/e2e-runner:latest
      command:
        - bash
        - -c
        - |
          set -euo pipefail
          cd /e2e
          bash auth/generate.sh
          echo "→ Auth fixtures ready"
          ls -la auth/keys/ auth/tokens/ auth/jwks.json auth/nginx.conf
      volumeMounts:
        - name: e2e-tree
          mountPath: /e2e

  containers:

    # -------------------------------------------------------------------------
    # Grob proxy under test
    # -------------------------------------------------------------------------
    - name: grob
      image: localhost/grob:e2e
      ports:
        - containerPort: 13456
          hostPort: 13456
          protocol: TCP
      env:
        - name: GROB_CONFIG
          value: /etc/grob/config.toml
        - name: RUST_LOG
          value: debug
      volumeMounts:
        - name: grob-config
          mountPath: /etc/grob/config.toml
          subPath: grob-test.toml
          readOnly: true
        - name: grob-audit
          mountPath: /tmp/grob-audit
      livenessProbe:
        httpGet:
          path: /health
          port: 13456
        initialDelaySeconds: 5
        periodSeconds: 5
        failureThreshold: 6
      readinessProbe:
        httpGet:
          path: /health
          port: 13456
        initialDelaySeconds: 3
        periodSeconds: 2
        failureThreshold: 10

    # -------------------------------------------------------------------------
    # VidaiMock — physics-accurate LLM mock server (Rust binary)
    # https://github.com/vidaiUK/VidaiMock
    # -------------------------------------------------------------------------
    - name: vidaimock
      image: localhost/vidaimock:e2e
      ports:
        - containerPort: 8100
          hostPort: 8100
          protocol: TCP

    # -------------------------------------------------------------------------
    # VidaiMock (URL response) — returns responses containing suspicious URLs
    # Used for output-side DLP testing (URL exfiltration, entropy detection)
    # -------------------------------------------------------------------------
    - name: vidaimock-url
      image: localhost/vidaimock:e2e
      args: ["--host", "0.0.0.0", "--port", "8101", "--response-file", "/etc/vidaimock/echo-with-url.json"]
      ports:
        - containerPort: 8101
          hostPort: 8101
          protocol: TCP
      volumeMounts:
        - name: vidaimock-config
          mountPath: /etc/vidaimock
          readOnly: true

    # -------------------------------------------------------------------------
    # VidaiMock (tool_use response) — returns tool_use content blocks
    # Used for HIT Gateway approval flow testing
    # -------------------------------------------------------------------------
    - name: vidaimock-tool
      image: localhost/vidaimock:e2e
      args: ["--host", "0.0.0.0", "--port", "8102", "--response-file", "/etc/vidaimock/tool-use-response.json"]
      ports:
        - containerPort: 8102
          hostPort: 8102
          protocol: TCP
      volumeMounts:
        - name: vidaimock-config
          mountPath: /etc/vidaimock
          readOnly: true

    # -------------------------------------------------------------------------
    # Toxiproxy — TCP fault injection in front of VidaiMock
    # -------------------------------------------------------------------------
    - name: toxiproxy
      image: docker.io/shopify/toxiproxy:latest
      ports:
        - containerPort: 8474
          hostPort: 8474
          protocol: TCP
        - containerPort: 9001
          hostPort: 9001
          protocol: TCP
        - containerPort: 9002
          hostPort: 9002
          protocol: TCP
        - containerPort: 9003
          hostPort: 9003
          protocol: TCP

    # -------------------------------------------------------------------------
    # mock-jwks — nginx serving JWKS generated by auth-init
    # Uses the same e2e-tree hostPath so it reads the generated files.
    # -------------------------------------------------------------------------
    - name: mock-jwks
      image: docker.io/library/nginx:alpine
      ports:
        - containerPort: 8443
          hostPort: 8443
          protocol: TCP
      volumeMounts:
        - name: e2e-tree
          mountPath: /usr/share/nginx/html/.well-known/jwks.json
          subPath: auth/jwks.json
          readOnly: true
        - name: e2e-tree
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: auth/nginx.conf
          readOnly: true

  volumes:
    - name: e2e-tree
      hostPath:
        path: ${E2E_DIR}
        type: Directory

    - name: grob-config
      hostPath:
        path: ${E2E_DIR}/config/mock
        type: Directory

    - name: grob-audit
      hostPath:
        path: /tmp/grob-audit
        type: DirectoryOrCreate

    - name: vidaimock-config
      hostPath:
        path: ${E2E_DIR}/config/vidaimock
        type: Directory
