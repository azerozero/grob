[workspace]
# Don't publish to crates.io — release via git tags only
publish = false
# Determine versions from git tags, not the cargo registry
git_only = true
git_release_enable = true
git_release_draft = false
git_release_latest = true
git_tag_name = "v{{ version }}"
git_tag_enable = true
changelog_update = true
pr_labels = ["release"]
# Only bump on meaningful commits (feat/fix/refactor/perf)
release_commits = "^(feat|fix|refactor|perf)"

[[package]]
name = "grob"
changelog_path = "CHANGELOG.md"
git_release_name = "v{{ version }}"
