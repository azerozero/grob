name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const ALLOWLIST = [
              'Destynova2',
              'dependabot[bot]',
              'renovate[bot]',
              'github-actions[bot]',
              'release-plz[bot]',
              'claude[bot]',
              'Claude',
            ];
            const CLA_SIGN_TEXT = 'I have read the CLA Document and I hereby sign the CLA';
            const CLA_URL = 'https://github.com/azerozero/grob/blob/main/CLA.md';
            const SIGNATURES_PATH = 'signatures/cla.json';
            const SIGNATURES_BRANCH = 'cla-signatures';

            // Determine PR number and author.
            let prNumber, prAuthor;
            if (context.eventName === 'issue_comment') {
              // Only react to the magic phrase.
              if (!context.payload.comment.body.trim().startsWith(CLA_SIGN_TEXT)) return;
              if (!context.payload.issue.pull_request) return;
              prNumber = context.payload.issue.number;
              prAuthor = context.payload.comment.user.login;
            } else {
              prNumber = context.payload.pull_request.number;
              prAuthor = context.payload.pull_request.user.login;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Check allowlist.
            if (ALLOWLIST.includes(prAuthor)) {
              await github.rest.repos.createCommitStatus({
                owner, repo,
                sha: (await github.rest.pulls.get({ owner, repo, pull_number: prNumber })).data.head.sha,
                state: 'success',
                context: 'CLA',
                description: 'Allowlisted contributor',
              });
              return;
            }

            // Load existing signatures.
            let signatures = [];
            try {
              const { data } = await github.rest.repos.getContent({
                owner, repo, path: SIGNATURES_PATH, ref: SIGNATURES_BRANCH,
              });
              const content = JSON.parse(Buffer.from(data.content, 'base64').toString());
              signatures = content.signedContributors || [];
            } catch {
              // File or branch does not exist yet.
            }

            const hasSigned = signatures.some(s => s.login === prAuthor);

            // If this is a comment event with the sign phrase, record the signature.
            if (context.eventName === 'issue_comment' && !hasSigned) {
              signatures.push({
                login: prAuthor,
                signed_at: new Date().toISOString(),
                pr: prNumber,
              });

              // Ensure branch exists.
              let branchExists = true;
              try {
                await github.rest.git.getRef({ owner, repo, ref: `heads/${SIGNATURES_BRANCH}` });
              } catch {
                branchExists = false;
                const defaultBranch = (await github.rest.repos.get({ owner, repo })).data.default_branch;
                const { data: ref } = await github.rest.git.getRef({ owner, repo, ref: `heads/${defaultBranch}` });
                await github.rest.git.createRef({
                  owner, repo,
                  ref: `refs/heads/${SIGNATURES_BRANCH}`,
                  sha: ref.object.sha,
                });
              }

              // Write updated signatures.
              const newContent = JSON.stringify({ signedContributors: signatures }, null, 2) + '\n';
              let fileSha;
              if (branchExists) {
                try {
                  const { data } = await github.rest.repos.getContent({
                    owner, repo, path: SIGNATURES_PATH, ref: SIGNATURES_BRANCH,
                  });
                  fileSha = data.sha;
                } catch {}
              }

              const params = {
                owner, repo,
                path: SIGNATURES_PATH,
                message: `chore: record CLA signature for ${prAuthor} (#${prNumber})`,
                content: Buffer.from(newContent).toString('base64'),
                branch: SIGNATURES_BRANCH,
              };
              if (fileSha) params.sha = fileSha;
              await github.rest.repos.createOrUpdateFileContents(params);

              // Post confirmation comment.
              await github.rest.issues.createComment({
                owner, repo, issue_number: prNumber,
                body: `✅ @${prAuthor} has signed the CLA. Thank you!`,
              });

              // Set success status.
              const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
              await github.rest.repos.createCommitStatus({
                owner, repo,
                sha: pr.head.sha,
                state: 'success',
                context: 'CLA',
                description: 'CLA signed',
              });
              return;
            }

            // Set status based on signature state.
            const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
            if (hasSigned) {
              await github.rest.repos.createCommitStatus({
                owner, repo,
                sha: pr.head.sha,
                state: 'success',
                context: 'CLA',
                description: 'CLA signed',
              });
            } else {
              await github.rest.repos.createCommitStatus({
                owner, repo,
                sha: pr.head.sha,
                state: 'pending',
                context: 'CLA',
                description: 'CLA signature required',
              });
              await github.rest.issues.createComment({
                owner, repo, issue_number: prNumber,
                body: [
                  `Thank you for your contribution! Before we can merge this PR, you need to sign our [Contributor License Agreement](${CLA_URL}).`,
                  '',
                  'The CLA ensures that A00 SASU can distribute your contribution under both the AGPL-3.0 and our commercial license. **You retain full copyright** on your contributions.',
                  '',
                  'To sign, please post a comment with exactly the following text:',
                  '',
                  `> ${CLA_SIGN_TEXT}`,
                ].join('\n'),
              });
            }
