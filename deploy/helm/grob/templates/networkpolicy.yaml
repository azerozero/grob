{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "grob.fullname" . }}
  labels:
    {{- include "grob.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "grob.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  # The control plane (/api/config/reload, /rpc) shares grob's port, so ingress
  # is locked down here. With no `from` sources configured this is default-deny
  # (ingress: []); set networkPolicy.from to allow specific clients.
  {{- if .Values.networkPolicy.from }}
  ingress:
    - from:
        {{- toYaml .Values.networkPolicy.from | nindent 8 }}
      ports:
        - protocol: TCP
          port: {{ .Values.containerPort }}
  {{- else }}
  ingress: []
  {{- end }}
{{- end }}
