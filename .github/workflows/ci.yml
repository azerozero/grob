name: CI

on:
  push:
    branches: [develop]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - "LICENSE*"
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - "LICENSE*"
  workflow_dispatch:

permissions:
  contents: read
  checks: write

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUST_BACKTRACE: short
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: clippy-${{ matrix.os }}
          save-if: ${{ github.ref == 'refs/heads/develop' }}
      - run: cargo clippy --all-targets -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: test-${{ matrix.os }}
          save-if: ${{ github.ref == 'refs/heads/develop' }}
      - uses: taiki-e/install-action@nextest
      - run: cargo nextest run --profile ci
      - run: cargo test --doc

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: coverage
          save-if: ${{ github.ref == 'refs/heads/develop' }}
      - uses: taiki-e/install-action@cargo-llvm-cov
      - run: cargo llvm-cov --lcov --output-path lcov.info
      - uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          VERSION=$(curl -sSf https://api.github.com/repos/gitleaks/gitleaks/releases/latest | jq -r .tag_name | sed 's/^v//')
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | sudo tar xz -C /usr/local/bin gitleaks
      - name: Run gitleaks
        run: gitleaks detect --source . --log-opts "${{ github.event.before }}..${{ github.sha }}" --verbose

  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  feature-check:
    name: Feature Powerset
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: hack
          save-if: ${{ github.ref == 'refs/heads/develop' }}
      - uses: taiki-e/install-action@cargo-hack
      - run: cargo hack check --feature-powerset --depth 2 --no-dev-deps

  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: test-ubuntu-latest
          save-if: false
      - name: Install podman
        run: sudo apt-get update -qq && sudo apt-get install -y -qq podman
      - name: Build grob image from current commit
        run: |
          cargo build --release
          printf 'FROM debian:bookworm-slim\nCOPY target/release/grob /grob\nENTRYPOINT ["/grob"]\nCMD ["run","--json-logs","--host","0.0.0.0","--port","13456"]\n' \
            | podman build -t localhost/grob:e2e -f - .
      - name: Build test images
        working-directory: tests/e2e
        run: |
          podman build -t localhost/vidaimock:e2e images/vidaimock/
          podman build -t localhost/e2e-runner:latest images/runner/
      - name: Start pod
        working-directory: tests/e2e
        run: make up wait-jwks init-proxies
      - name: Run hurl tests
        working-directory: tests/e2e
        run: make test-hurl
      - name: Collect logs
        if: failure()
        run: podman pod exists e2e-pod && podman logs e2e-pod-grob 2>&1 | tail -100 || true
      - name: Teardown
        if: always()
        working-directory: tests/e2e
        run: make down

  load:
    name: Load test (smoke)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    needs: [e2e]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: test-ubuntu-latest
          save-if: false
      - name: Install podman
        run: sudo apt-get update -qq && sudo apt-get install -y -qq podman
      - name: Build grob image from current commit
        run: |
          cargo build --release
          printf 'FROM debian:bookworm-slim\nCOPY target/release/grob /grob\nENTRYPOINT ["/grob"]\nCMD ["run","--json-logs","--host","0.0.0.0","--port","13456"]\n' \
            | podman build -t localhost/grob:e2e -f - .
      - name: Build test images
        working-directory: tests/e2e
        run: |
          podman build -t localhost/vidaimock:e2e images/vidaimock/
          podman build -t localhost/e2e-runner:latest images/runner/
      - name: Start pod
        working-directory: tests/e2e
        run: make up wait-jwks init-proxies
      - name: Run k6 smoke load test
        working-directory: tests/e2e
        run: make load
      - name: Teardown
        if: always()
        working-directory: tests/e2e
        run: make down

  docs:
    name: Doc Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: docs
          save-if: ${{ github.ref == 'refs/heads/develop' }}
      - name: Check missing doc comments
        env:
          RUSTDOCFLAGS: "-W missing-docs"
        run: |
          WARNINGS=$(cargo doc --no-deps 2>&1 | grep "^warning: missing documentation" | wc -l)
          if [ "$WARNINGS" -gt 0 ]; then
            echo "::error::Found $WARNINGS undocumented public items"
            cargo doc --no-deps 2>&1 | grep "^warning: missing documentation" -A2
            exit 1
          fi
          echo "All public items are documented"

  machete:
    name: Unused Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: machete
          save-if: ${{ github.ref == 'refs/heads/develop' }}
      - uses: bnjbvr/cargo-machete@main

  semver:
    name: API Compatibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: semver
          save-if: ${{ github.ref == 'refs/heads/develop' }}
      - name: Install cargo-semver-checks
        run: cargo install cargo-semver-checks --locked
      - name: Find latest tag for baseline
        id: baseline
        run: |
          TAG=$(git tag --sort=-v:refname | head -1)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
      - name: Check semver compatibility
        if: steps.baseline.outputs.tag != ''
        run: cargo semver-checks --baseline-rev ${{ steps.baseline.outputs.tag }}
