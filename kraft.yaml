spec: v0.6

name: grob
unikraft:
  version: staging
  kconfig:
    # POSIX event support required by tokio async runtime
    CONFIG_LIBPOSIX_EVENT: "y"
    # Networking stack
    CONFIG_LIBPOSIX_SOCKET: "y"
    CONFIG_LIBLWIP: "y"
    CONFIG_LWIP_IPV4: "y"
    CONFIG_LWIP_IPV6: "y"
    CONFIG_LWIP_TCP: "y"
    CONFIG_LWIP_UDP: "y"
    CONFIG_LWIP_DNS: "y"
    # Filesystem (config file reads)
    CONFIG_LIB9PFS: "y"
    CONFIG_LIBVFSCORE: "y"
    CONFIG_LIBVFSCORE_AUTOMOUNT_UP: "y"
    # Memory
    CONFIG_LIBUKALLOC: "y"
    CONFIG_LIBUKALLOCBBUDDY: "y"
    # TLS (rustls needs it)
    CONFIG_LIBPOSIX_PROCESS: "y"
    CONFIG_LIBPOSIX_USER: "y"

targets:
  - platform: qemu
    architecture: x86_64
  - platform: firecracker
    architecture: x86_64

rootfs: ./rootfs

cmd: ["/grob", "start", "--host", "0.0.0.0", "--port", "8080"]
