[workspace]
# Don't publish to crates.io — release via git tags only
publish = false
git_release_enable = true
git_release_draft = false
git_release_latest = true
git_tag_name = "v{{ version }}"
git_tag_enable = true
changelog_update = true
pr_labels = ["release"]
# Compare against latest git tag (not crates.io) for version bumping
semver_check = false
release_commits = "^(feat|fix|refactor|perf)"

[[package]]
name = "grob"
changelog_path = "CHANGELOG.md"
git_release_name = "v{{ version }}"
