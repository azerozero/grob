[workspace]
# Don't publish to crates.io — release via git tags only
publish = false
# Determine versions from git tags, not the cargo registry
git_only = true
# GitHub Release is created by the Release workflow (not release-plz)
# to avoid immutable release conflicts when uploading binaries.
git_release_enable = false
git_tag_name = "v{{ version }}"
git_tag_enable = true
changelog_update = true
pr_labels = ["release"]
# Only bump on commits that change Rust source code.
# Negative lookahead excludes e2e, ci, docs scopes to avoid release spam.
release_commits = "^(feat|fix|refactor|perf)(?!\\((e2e|ci|docs)\\))"

[[package]]
name = "grob"
changelog_path = "CHANGELOG.md"
git_release_name = "v{{ version }}"
