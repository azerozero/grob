fail_fast = true
default_install_hook_types = ["pre-commit", "pre-push"]

# Builtin fast hooks (Rust-native, no network, no environment)
[[repos]]
repo = "builtin"
hooks = [
  { id = "trailing-whitespace" },
  { id = "end-of-file-fixer" },
  { id = "check-toml" },
  { id = "check-yaml", args = ["--allow-multiple-documents"] },
  { id = "check-merge-conflict" },
  { id = "mixed-line-ending", args = ["--fix", "lf"] },
]

# Gitleaks — detect secrets in staged changes (pre-commit)
[[repos]]
repo = "local"

[[repos.hooks]]
id = "gitleaks"
name = "gitleaks (secret detection)"
language = "system"
entry = "gitleaks protect --staged --no-banner"
pass_filenames = false

# Cargo fmt — fast, runs on pre-commit
[[repos.hooks]]
id = "cargo-fmt"
name = "cargo fmt"
language = "system"
entry = "cargo fmt --all --"
types = ["rust"]
pass_filenames = false

# Clippy — runs on pre-commit (catches warnings before CI)
[[repos.hooks]]
id = "cargo-clippy"
name = "cargo clippy"
language = "system"
entry = "cargo clippy --all-targets -- -D warnings"
types = ["rust"]
pass_filenames = false

# Tests — expensive, runs only on pre-push
[[repos.hooks]]
id = "cargo-test"
name = "cargo test"
language = "system"
entry = "cargo nextest run --profile ci"
types = ["rust"]
pass_filenames = false
stages = ["pre-push"]

# Doc tests — not covered by nextest
[[repos.hooks]]
id = "cargo-doctest"
name = "cargo doc tests"
language = "system"
entry = "cargo test --doc"
types = ["rust"]
pass_filenames = false
stages = ["pre-push"]

# Cargo deny — license & advisory & dependency checks
# Only runs when Cargo.toml/lock or Rust files change.
[[repos.hooks]]
id = "cargo-deny"
name = "cargo deny"
language = "system"
entry = "cargo deny check"
types_or = ["rust", "toml"]
pass_filenames = false
stages = ["pre-push"]

# Cargo machete — unused dependencies
[[repos.hooks]]
id = "cargo-machete"
name = "cargo machete"
language = "system"
entry = "cargo machete"
types = ["toml"]
pass_filenames = false
stages = ["pre-push"]

# Doc coverage — no undocumented public items
[[repos.hooks]]
id = "cargo-doc-coverage"
name = "cargo doc coverage"
language = "system"
entry = "sh"
args = ["-c", "RUSTDOCFLAGS='-W missing-docs' cargo doc --no-deps 2>&1 | grep -q 'warning: missing documentation' && { echo 'ERROR: undocumented public items found'; RUSTDOCFLAGS='-W missing-docs' cargo doc --no-deps 2>&1 | grep 'warning: missing documentation' | head -20; exit 1; } || true"]
types = ["rust"]
pass_filenames = false
stages = ["pre-push"]

# Security audit — known vulnerabilities
# Only runs when Cargo.toml/lock changes.
[[repos.hooks]]
id = "cargo-audit"
name = "cargo audit"
language = "system"
entry = "cargo audit"
types_or = ["rust", "toml"]
pass_filenames = false
stages = ["pre-push"]

# Semver compatibility — compare against latest git tag (not crates.io)
# Only runs when Rust source changes.
[[repos.hooks]]
id = "cargo-semver-checks"
name = "cargo semver-checks"
language = "system"
entry = "sh"
args = ["-c", "TAG=$(git tag --sort=-v:refname | head -1) && [ -n \"$TAG\" ] && cargo semver-checks --baseline-rev \"$TAG\" || echo 'No tags found, skipping semver check'"]
types = ["rust"]
pass_filenames = false
stages = ["pre-push"]

# Sweep stale build artifacts (>7 days) to prevent target/ bloat
[[repos.hooks]]
id = "cargo-sweep"
name = "cargo sweep (clean old artifacts)"
language = "system"
entry = "cargo sweep --time 7"
always_run = true
pass_filenames = false
stages = ["pre-push"]
